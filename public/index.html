.scroll-row{display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent;width:100%}.scroll-row::-webkit-scrollbar{height:4px}.scroll-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.scroll-row .hot-card{flex-shrink:0;width:170px}.carousel{position:relative;width:100%;max-width:320px;margin:0 auto;overflow:hidden;border-radius:14px;user-select:none}.carousel-track{display:flex;transition:transform .5s cubic-bezier(.25,.1,.25,1)}.carousel-slide{flex-shrink:0;width:100%;cursor:pointer}.carousel-slide .card-img{width:100%;aspect-ratio:3/4;border-radius:0}.carousel-title{padding:10px 12px;font-size:.85rem;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--text);background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px}.carousel-arrow{position:absolute;top:38%;transform:translateY(-50%);z-index:3;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.45);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .2s;backdrop-filter:blur(4px)}.carousel-arrow:hover{background:rgba(34,197,94,.6);border-color:var(--primary)}.carousel-arrow-left{left:8px}.carousel-arrow-right{right:8px}.carousel-dots{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:3;padding:4px 8px;border-radius:999px;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}.carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:all .3s;border:none;padding:0}.carousel-dot.active{background:var(--primary);width:18px;border-radius:3px}</style></head><body><div id="app"><div class="app"><header class="header"><div class="header-inner"><a class="logo" @click="goHome"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>云盘搜</a><div class="search-bar"><span class="icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span><input v-model="searchQuery" placeholder="搜索电影..." @keydown.enter="goSearch"></div><button class="theme-btn" @click="toggleTheme" :title="isDark?'切换到亮色模式':'切换到暗色模式'">{{isDark?"&#x1F319;":"&#x2600;&#xFE0F;"}}</button></div></header><main class="main"><div v-if="page==='home'"><section class="hero"><div class="hero-bg"></div><div class="hero-content"><h1>想找的资源，一站搜齐</h1><p>夸克网盘 · 百度网盘 · 百万资源实时检索</p><div class="hero-search"><span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span><input v-model="searchQuery" placeholder="搜索电影、电视剧、文档、软件..." @keydown.enter="goSearch"></div><div class="hot-tags"><button v-for="t in hotTerms" :key="t" class="hot-tag" @click="searchHot(t)">{{t}}</button></div></div></section><div class="section" style="margin-top:10px"><div class="stats-row"><div class="stat-card"><div class="stat-num">{{stats.quark.toLocaleString()}}</div><div class="stat-label">夸克网盘</div></div><div class="stat-card"><div class="stat-num">{{stats.baidu.toLocaleString()}}</div><div class="stat-label">百度网盘</div></div><div class="stat-card"><div class="stat-num purple">{{stats.total.toLocaleString()}}</div><div class="stat-label">总收录资源</div></div></div></div><div class="section"><div class="section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>热门推荐</div><div v-if="trendingLoading" class="loading-state"><div class="spinner"></div><div>加载中...</div></div><div <div v-else class="scroll-row"><div v-for="item in trendingItems" :key="item.term+item.url" class="hot-card" @click="searchHot(item.term)"><div class="card-img"><img v-if="item.cover" :src="item.cover" :alt="item.title" @error="handleImgErr($event,item)"><div v-else class="card-img-fallback" :style="{background:getGrad(item)}">{{item.term.slice(0,1)}}</div></div><div class="card-body"><div class="card-title">{{item.title}}</div></div></div></div></div></div></div><footer class="footer"><p>声明：本站是网盘索引系统，所有内容均来自互联网所提供的公开引用资源，未提供资源上传、存储服务。</p></footer></div></div></main></div></div><script>var createApp,ref,reactive,computed,onMounted;(function(){createApp=Vue.createApp;ref=Vue.ref;reactive=Vue.reactive;computed=Vue.computed;onMounted=Vue.onMounted})();var D={quark:"夸克网盘",baidu:"百度网盘",douban:"豆瓣热榜",aliyun:"阿里云盘",tianyi:"天翼云盘",uc:"UC",xunlei:"迅雷网盘"};var DC={quark:"#06B6D4",baidu:"#2563EB",douban:"#E04006",aliyun:"#0EA5E9",tianyi:"#EC4899",uc:"#F97316",xunlei:"#3B82F6"};var app=createApp({setup:function(){var isDark=ref(true),page=ref("home"),sq=ref(""),trendingItems=ref([]),trendingLoading=ref(true),hotTerms=ref([]),stats=ref({quark:0,baidu:0,total:0});var allCount=computed(function(){var t=0;Object.values(gr.value).forEach(function(a){t+=a.length});return t});var lastUpdate=computed(function(){var lt="";Object.values(gr.value).forEach(function(a){a.forEach(function(i){if(i.datetime&&i.datetime>lt)lt=i.datetime})});if(!lt)return"-";return lt.slice(0,10)});function toggleTheme(){isDark.value=!isDark.value;document.documentElement.classList.toggle("light",!isDark.value);localStorage.setItem("theme",isDark.value?"dark":"light")}function goHome(){sq.value="";page.value="home"}function searchHot(t){window.location="/search?q="+encodeURIComponent(t)}function goSearch(){var q=sq.value.trim();if(q)window.location="/search?q="+encodeURIComponent(q)}function loadTrending(){fetch("/api/hot/trending").then(function(r){return r.json()}).then(function(d){trendingItems.value=d.items||[];hotTerms.value=d.terms||[];stats.value=d.stats||{quark:0,baidu:0,total:0}}).catch(function(){}).finally(function(){trendingLoading.value=false;Vue.nextTick(function(){var el=document.querySelector(".scroll-row");if(!el)return;var si=setInterval(function(){if(el.scrollLeft>=el.scrollWidth-el.clientWidth-1){el.scrollLeft=0}el.scrollLeft+=2},30);el.onmouseenter=function(){clearInterval(si)};el.onmouseleave=function(){si=setInterval(function(){if(el.scrollLeft>=el.scrollWidth-el.clientWidth-1){el.scrollLeft=0}el.scrollLeft+=2},30)}})})}function handleImgErr(e,item){e.target.style.display="none";e.target.parentNode.querySelector(".card-img-fallback")||(function(){var fb=document.createElement("div");fb.className="card-img-fallback";fb.style.background=gradients[item.term.length%gradients.length];fb.textContent=item.term.slice(0,1);e.target.parentNode.appendChild(fb)}())}var gradients=["linear-gradient(135deg,#1a1a2e,#16213e)","linear-gradient(135deg,#2d1b2e,#1a1a2e)","linear-gradient(135deg,#0a2f44,#001220)","linear-gradient(135deg,#2e1d0e,#1a1208)","linear-gradient(135deg,#1a1a2e,#301934)","linear-gradient(135deg,#1a141e,#0d0a12)","linear-gradient(135deg,#0f2027,#203a43)","linear-gradient(135deg,#42275a,#734b6d)"];function getGrad(item){return gradients[item.term.length%gradients.length]}function fd(dt){if(!dt)return"";try{return new Date(dt).toLocaleString("zh-CN",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})}catch(e){return dt}}var sortedResults=computed(function(){var at=activeType.value;var items=[];Object.keys(gr.value).forEach(function(t){if(!at||at===t){gr.value[t].forEach(function(it,i){items.push({_type:t,_key:t+"-"+i,note:it.note,title:it.title,url:it.url,password:it.password,datetime:it.datetime,images:it.images})})}});var lv=ls.value;items.sort(function(a,b){var sa=lv[a._key]&&lv[a._key].status||"";var sb=lv[b._key]&&lv[b._key].status||"";function rank(s){if(s==="invalid")return 4;if(s==="locked")return 3;if(!s)return 2;if(s==="uncertain")return 1;return 0}var da=new Date(a.datetime).getTime()||0;var db=new Date(b.datetime).getTime()||0;return rank(sa)-rank(sb)||db-da});return items});onMounted(function(){var st=localStorage.getItem("theme");if(st==="light"){isDark.value=false;document.documentElement.classList.add("light")}else if(st==="dark"){isDark.value=true;document.documentElement.classList.remove("light")}else{isDark.value=true};loadTrending()});return{isDark,toggleTheme,page,searchQuery:sq,trendingItems,trendingLoading,hotTerms,stats,searchHot,goSearch,goHome,diskNames:D,diskColors:DC,handleImgErr,getGrad}}});app.mount("#app");</script></body></html>
